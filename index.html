<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鹿島アントラーズ なんでも案内所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --red-dark: #8B0A1F;
    --red-light: #E8304A;
    --black: #0D0D0D;
    --white: #F5F0EB;
    --gray: #2A2A2A;
    --gold: #C9A84C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  header {
    background: var(--red-dark);
    border-bottom: 3px solid var(--gold);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-emblem { font-size: 2.4rem; line-height: 1; }
  .header-text h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 0.05em;
  }
  .header-text p {
    font-size: 0.72rem;
    color: rgba(245,240,235,0.6);
    margin-top: 2px;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px 16px;
  }
  #chat-window {
    flex: 1;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 180px);
  }
  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 2px; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--red-dark);
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .bubble {
    max-width: 76%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.75;
    font-size: 0.9rem;
  }
  .msg.bot .bubble {
    background: var(--gray);
    border-top-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .msg.user .bubble {
    background: var(--red-dark);
    border-top-right-radius: 4px;
  }
  .chip-area { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip {
    background: transparent;
    border: 1.5px solid var(--red);
    color: var(--white);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { background: var(--red); transform: translateY(-1px); }
  .source-tag {
    display: inline-block;
    font-size: 0.68rem;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }
  .input-area {
    background: var(--gray);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 14px;
    margin-top: 8px;
  }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: inherit;
    font-size: 0.9rem;
    resize: none;
    min-height: 24px;
    max-height: 100px;
    line-height: 1.5;
  }
  #user-input::placeholder { color: rgba(245,240,235,0.35); }
  #send-btn {
    background: var(--red);
    border: none;
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }
  #send-btn:hover { background: var(--red-light); }
  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(245,240,235,0.3);
    margin-top: 8px;
  }
  .rel-label {
    font-size: 0.75rem;
    color: rgba(245,240,235,0.5);
    margin-top: 10px;
  }
</style>
</head>
<body>
<header>
  <div class="header-emblem">⚽</div>
  <div class="header-text">
    <h1>鹿島アントラーズ なんでも案内所</h1>
    <p>初心者・ライトファンのための観戦サポートBot</p>
  </div>
</header>
<main>
  <div id="chat-window"></div>
  <div class="input-area">
    <textarea id="user-input" placeholder="質問を入力してください…" rows="1"></textarea>
    <button id="send-btn">➤</button>
  </div>
  <div class="hint">Enterで送信 / Shift+Enterで改行</div>
</main>
<script>
var DATABASE = [
  {
    keywords: ["スタジアム","カシマ","カシマスタジアム","会場","どこ"],
    title: "カシマサッカースタジアム 基本情報",
    content: "カシマサッカースタジアムは茨城県鹿嶋市にある鹿島アントラーズのホームスタジアムです。\n\n収容人数は約4万人で、ピッチとスタンドの距離が近く、臨場感が抜群！1993年のJリーグ開幕に合わせて建設された歴史あるスタジアムです。",
    source: "スタジアム基本情報"
  },
  {
    keywords: ["アクセス","行き方","電車","バス","交通","どうやって"],
    title: "スタジアムへのアクセス",
    content: "東京方面からはJR高速バス「カシマ号」が便利です（東京駅・品川駅などから出発、所要約2時間）。\n\n電車の場合は鹿島神宮駅まで行き、そこからシャトルバスが出ています。試合当日はとても混雑するので、早めの出発がおすすめです！",
    source: "アクセス情報"
  },
  {
    keywords: ["グルメ","食べ物","飯","ご飯","屋台","スタグル","食事","おすすめ"],
    title: "スタジアムグルメ",
    content: "スタジアム周辺にはスタグル（スタジアムグルメ）が充実しています！\n\n名物は「鹿島やきそば」や地元食材を使ったフードが多数。コンコースにも売店があり、試合前から楽しめます。人気メニューは売り切れることもあるので早めに購入がおすすめです。",
    source: "スタジアム案内"
  },
  {
    keywords: ["席","座席","チケット","どの席","どこに座る","バックスタンド","メインスタンド","ゴール裏","初心者"],
    title: "座席・チケットの選び方",
    content: "初心者には「バックスタンド」がおすすめです！ピッチ全体を見渡せて戦術がわかりやすいです。\n\n「ゴール裏（サポーターズシート）」は応援団と一緒に歌って応援する熱狂エリア。\n「メインスタンド」は選手ベンチに近く、選手を間近で見られます。",
    source: "観戦ガイド"
  },
  {
    keywords: ["選手","誰が","有名","注目","スター","レジェンド"],
    title: "鹿島の注目選手・レジェンド",
    content: "鹿島アントラーズは多くの名選手を輩出してきたクラブです。\n\n歴史的なレジェンドとしては「ジーコ」「小笠原満男」「本山雅志」「柳沢敦」などが有名。現在も若手からベテランまで個性豊かな選手たちが活躍しています！",
    source: "選手情報"
  },
  {
    keywords: ["ポジション","フォワード","ミッドフィールダー","ディフェンダー","GK","役割","FW","MF","DF"],
    title: "サッカーのポジション解説",
    content: "サッカーは11人で戦います。\n\n・GK（ゴールキーパー）：ゴールを守る唯一の手が使える選手\n・DF（ディフェンダー）：守備の要\n・MF（ミッドフィールダー）：中盤で攻守をつなぐ司令塔\n・FW（フォワード）：ゴールを狙う攻撃の先鋒\n\nまずこの4つを覚えると試合が見やすくなります！",
    source: "サッカー入門"
  },
  {
    keywords: ["フォーメーション","戦術","4-4-2","4-3-3","3バック","システム","並び"],
    title: "フォーメーション基礎",
    content: "フォーメーションは選手の並び方のことです。\n\n例えば「4-3-3」なら守備4人・中盤3人・攻撃3人という意味。鹿島は伝統的に組織的な守備とカウンターアタックを得意とする「鹿島スタイル」が多くのタイトル獲得につながっています！",
    source: "戦術解説"
  },
  {
    keywords: ["オフサイド","ルール","反則","ファール"],
    title: "オフサイドとは？",
    content: "オフサイドは初心者が最も混乱するルールのひとつです！\n\n簡単に言うと「パスが出た瞬間、相手ゴール側に相手選手が1人以下しかいない位置でパスを受けると反則」です。\n\nDFラインとFWの駆け引きが観戦の面白さにもなっています！",
    source: "ルール解説"
  },
  {
    keywords: ["歴史","いつから","創設","強い","タイトル","優勝","何冠"],
    title: "鹿島アントラーズの歴史",
    content: "鹿島アントラーズは1947年創設の住友金属工業サッカー部を前身とし、1991年にJリーグ創設に参加した10クラブのひとつです。\n\nJリーグ最多の20冠以上のタイトルを獲得しており、「勝利にこだわるクラブ」として知られています！",
    source: "クラブ情報"
  },
  {
    keywords: ["駐車場","車","駐車"],
    title: "スタジアムの駐車場",
    content: "カシマスタジアムには複数の駐車場があります。\n\nただし試合当日は非常に混雑するため、公共交通機関の利用がおすすめです。車で行く場合は事前にチケットを購入し、早めに到着しましょう。",
    source: "アクセス情報"
  },
  {
    keywords: ["持ち物","何を持っていく","準備","持参"],
    title: "観戦の持ち物",
    content: "スタジアム観戦の持ち物リストです！\n\n・チケット（スマホ画面でもOK）\n・飲み物（場内でも購入可）\n・雨具（屋根がない席もあります）\n・防寒着（夜の試合は冷えます）\n・タオルマフラー（応援グッズ）\n\n初めての方はまず身軽に行くのがおすすめです！",
    source: "観戦ガイド"
  }
];

function searchDB(query) {
  var q = query.toLowerCase();
  var results = [];
  for (var i = 0; i < DATABASE.length; i++) {
    var item = DATABASE[i];
    var score = 0;
    for (var j = 0; j < item.keywords.length; j++) {
      if (q.indexOf(item.keywords[j]) !== -1) {
        score += item.keywords[j].length;
      }
    }
    if (score > 0) results.push({ item: item, score: score });
  }
  results.sort(function(a, b) { return b.score - a.score; });
  return results.slice(0, 3).map(function(r) { return r.item; });
}

var chatWindow = document.getElementById('chat-window');
var userInput = document.getElementById('user-input');
var sendBtn = document.getElementById('send-btn');

function appendMsg(role, html, chips, relatedItems) {
  var msg = document.createElement('div');
  msg.className = 'msg ' + role;
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🦌' : '👤';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  if (relatedItems && relatedItems.length) {
    var relLabel = document.createElement('div');
    relLabel.className = 'rel-label';
    relLabel.textContent = '関連情報：';
    bubble.appendChild(relLabel);
    var ca = document.createElement('div');
    ca.className = 'chip-area';
    relatedItems.forEach(function(item) {
      var btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = item.title;
      btn.onclick = function() { sendMessage(item.title); };
      ca.appendChild(btn);
    });
    bubble.appendChild(ca);
  }

  if (chips && chips.length) {
    var ca2 = document.createElement('div');
    ca2.className = 'chip-area';
    chips.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = c.label;
      btn.onclick = function() { sendMessage(c.query); };
      ca2.appendChild(btn);
    });
    bubble.appendChild(ca2);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatWindow.appendChild(msg);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

var DEFAULT_CHIPS = [
  { label: '🏟️ スタジアムへの行き方', query: 'カシマスタジアムへのアクセスを教えて' },
  { label: '🍜 スタグルのおすすめ', query: 'スタジアムグルメのおすすめは？' },
  { label: '💺 どの席がいい？', query: '初心者はどの座席がおすすめ？' },
  { label: '⚽ オフサイドって何？', query: 'オフサイドのルールを教えて' },
  { label: '🦌 鹿島の歴史', query: '鹿島アントラーズの歴史を教えて' }
];

function sendMessage(text) {
  var q = (text || userInput.value).trim();
  if (!q) return;
  userInput.value = '';
  userInput.style.height = 'auto';
  appendMsg('user', q.replace(/\n/g, '<br>'));

  var results = searchDB(q);

  setTimeout(function() {
    if (results.length === 0) {
      appendMsg('bot',
        'ごめんなさい、その質問にはまだ対応していません😿<br>以下の質問なら答えられます！',
        DEFAULT_CHIPS
      );
      return;
    }
    var main = results[0];
    var html = '【' + main.title + '】<br><br>' + main.content.replace(/\n/g, '<br>');
    html += '<br><span class="source-tag">📂 ' + main.source + '</span>';
    appendMsg('bot', html, null, results.slice(1));
  }, 300);
}

appendMsg('bot',
  'こんにちは！鹿島アントラーズ案内所へようこそ⚽<br>スタジアム観戦や選手・戦術のことなど、気になることを何でも聞いてください！<br><br>よくある質問からも選べます👇',
  [
    { label: '🏟️ スタジアムへの行き方', query: 'カシマスタジアムへのアクセスを教えて' },
    { label: '🍜 スタグルのおすすめ', query: 'スタジアムグルメのおすすめは？' },
    { label: '💺 どの席がいい？', query: '初心者はどの座席がおすすめ？' },
    { label: '⚽ オフサイドって何？', query: 'オフサイドのルールを教えて' },
    { label: '🦌 鹿島の歴史', query: '鹿島アントラーズの歴史を教えて' },
    { label: '📋 フォーメーションって？', query: 'フォーメーションについて教えて' },
    { label: '🎒 観戦の持ち物は？', query: 'スタジアムに持っていくものは？' }
  ]
);

sendBtn.addEventListener('click', function() { sendMessage(); });
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
userInput.addEventListener('input', function() {
  userInput.style.height = 'auto';
  userInput.style.height = userInput.scrollHeight + 'px';
});
</script>
</body>
</html>
