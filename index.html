<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メルスタもつ煮案内所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --red-dark: #8B0A1F;
    --black: #0D0D0D;
    --white: #F5F0EB;
    --gray: #2A2A2A;
    --gold: #C9A84C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--red-dark);
    border-bottom: 3px solid var(--gold);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-text h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
  }
  .header-text p {
    font-size: 0.7rem;
    color: rgba(245,240,235,0.6);
    margin-top: 2px;
  }
  main {
    flex: 1;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px 24px;
    display: flex;
    flex-direction: column;
  }
  #chat-window {
    flex: 1;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 120px);
  }
  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 2px; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--red-dark);
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.75;
    font-size: 0.88rem;
  }
  .msg.bot .bubble {
    background: var(--gray);
    border-top-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .msg.user .bubble {
    background: var(--red-dark);
    border-top-right-radius: 4px;
  }
  .priority-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .priority-btn {
    background: transparent;
    border: 1.5px solid rgba(201,168,76,0.4);
    color: var(--white);
    padding: 12px 10px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .priority-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .priority-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.2); color: var(--gold); font-weight: 700; }
  .priority-btn:disabled { opacity: 0.35; cursor: default; }
  .confirm-btn {
    background: var(--gold);
    border: none;
    color: var(--black);
    padding: 11px 20px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 12px;
    width: 100%;
    transition: opacity 0.2s;
  }
  .confirm-btn:hover { opacity: 0.85; }
  .confirm-btn:disabled { opacity: 0.3; cursor: default; }
  .choices { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .choice-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--white);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .choice-btn:hover { background: rgba(201,168,76,0.15); transform: translateX(4px); }
  .choice-btn.selected { background: var(--gold); color: var(--black); font-weight: 700; }
  .choice-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
  .step-indicator {
    font-size: 0.7rem;
    color: rgba(245,240,235,0.4);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .result-card {
    background: #1E1E1E;
    border: 2px solid var(--gold);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 10px;
  }
  .result-rank {
    background: var(--gold);
    color: var(--black);
    font-weight: 900;
    font-size: 0.8rem;
    padding: 6px 14px;
    letter-spacing: 0.05em;
  }
  .result-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
  }
  .result-img-placeholder {
    width: 100%;
    height: 140px;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .result-body { padding: 14px; }
  .result-name {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .result-desc {
    font-size: 0.82rem;
    color: rgba(245,240,235,0.75);
    line-height: 1.65;
  }
  .runner-up {
    background: #1A1A1A;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 0.82rem;
  }

    color: rgba(245,240,235,0.4);
    font-size: 0.72rem;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .runner-up-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .runner-up-row:last-child { border-bottom: none; }
  .runner-up-num { color: var(--gold); font-weight: 700; font-size: 0.78rem; width: 24px; }
  .runner-up-name { color: var(--white); font-weight: 700; font-size: 0.85rem; flex: 1; }
  .restart-btn {
    background: var(--red-dark);
    border: 1.5px solid var(--red);
    color: var(--white);
    padding: 11px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    margin-top: 12px;
    width: 100%;
    transition: background 0.2s;
  }

function calcScores(answers) {
  // ユーザーの希望値をキーごとにまとめる
  var userPrefs = {};
  answers.forEach(function(ans) {
    Object.keys(ans.keys).forEach(function(key) {
      userPrefs[key] = ans.keys[key];
    });
  });

  var scored = SHOPS.map(function(shop, idx) {
    var totalDiff = 0;
    var maxDiff = 0;
    Object.keys(userPrefs).forEach(function(key) {
      var userVal = userPrefs[key];
      var shopVal = shop.scores[key] || 0;
      totalDiff += Math.abs(userVal - shopVal);
      maxDiff += 4; // 1〜5の範囲なので最大差は4
    });
    var score = maxDiff > 0 ? Math.round((1 - totalDiff / maxDiff) * 100) : 100;
    return { shop: shop, pct: score, total: score, idx: idx };
  });
  // 安定ソート：同点の場合は元の配列順を維持
  scored.sort(function(a, b) {
    if (b.total !== a.total) return b.total - a.total;
    return a.idx - b.idx;
  });
  return scored;
}

var chatWindow = document.getElementById('chat-window');
var answers = [];
var selectedPriorities = [];
var detailQueue = [];
var detailIndex = 0;

function appendMsg(role, content) {
  var msg = document.createElement('div');
  msg.className = 'msg ' + role;
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🍲' : '👤';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (typeof content === 'string') {
    bubble.innerHTML = content;
  } else {
    bubble.appendChild(content);
  }
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatWindow.appendChild(msg);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return bubble;
}

function showPrioritySelect() {
  setTimeout(function() {
    var div = document.createElement('div');
    div.innerHTML = '<div style="margin-bottom:10px">何を重視しますか？<br><span style="font-size:0.78rem;color:rgba(245,240,235,0.5)">当てはまるものを選んで「決定」を押してください（複数選択可）</span></div>';

    var grid = document.createElement('div');
    grid.className = 'priority-grid';
    var selected = {};

    PRIORITIES.forEach(function(p) {
      var btn = document.createElement('button');
      btn.className = 'priority-btn';
      btn.innerHTML = p.label;
      btn.onclick = function() {
        if (selected[p.id]) {
          delete selected[p.id];
          btn.classList.remove('selected');
        } else {
          selected[p.id] = true;
          btn.classList.add('selected');
        }
        confirmBtn.disabled = Object.keys(selected).length === 0;
      };
      grid.appendChild(btn);
    });

    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'confirm-btn';
    confirmBtn.textContent = '決定する →';
    confirmBtn.disabled = true;
    confirmBtn.onclick = function() {
      grid.querySelectorAll('.priority-btn').forEach(function(b) { b.disabled = true; });
      confirmBtn.disabled = true;
      selectedPriorities = Object.keys(selected);
      var labels = PRIORITIES.filter(function(p) { return selected[p.id]; }).map(function(p) { return p.label; });
      appendMsg('user', labels.join('　'));
      detailQueue = selectedPriorities.slice();
      detailIndex = 0;
      showNextDetail();
    };

    div.appendChild(grid);
    div.appendChild(confirmBtn);
    appendMsg('bot', div);
  }, 600);
}

function showNextDetail() {
  if (detailIndex >= detailQueue.length) {

    return;
  }
  var key = detailQueue[detailIndex];
  var q = DETAIL_QUESTIONS[key];
  var total = detailQueue.length;
  var current = detailIndex + 1;

  setTimeout(function() {
    var div = document.createElement('div');
    var indicator = document.createElement('div');
    indicator.className = 'step-indicator';
    indicator.textContent = current + ' / ' + total;
    div.appendChild(indicator);

    var qText = document.createElement('div');
    qText.style.marginBottom = '4px';
    qText.textContent = q.question;
    div.appendChild(qText);

    var choices = document.createElement('div');
    choices.className = 'choices';

    q.choices.forEach(function(choice) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.label;
      btn.onclick = function() {
        choices.querySelectorAll('.choice-btn').forEach(function(b) { b.disabled = true; });
        btn.classList.add('selected');
        appendMsg('user', choice.label);
        answers.push(choice);
        detailIndex++;
        showNextDetail();
      };
      choices.appendChild(btn);
    });

    div.appendChild(choices);
    appendMsg('bot', div);
  }, 600);
}

function showResult() {
  setTimeout(function() {
    var ranked = calcScores(answers);
    var best = ranked[0];

    var div = document.createElement('div');
    div.innerHTML = 'あなたにぴったりのもつ煮はこちらです！🎉';

    var card = document.createElement('div');
    card.className = 'result-card';

    var badge = document.createElement('div');
    badge.className = 'result-rank';
    badge.textContent = '🏆 BEST MATCH';
    card.appendChild(badge);

    if (best.shop.image) {
      var img = document.createElement('img');
      img.className = 'result-img';
      img.src = best.shop.image;
      img.alt = best.shop.name;
      card.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'result-img-placeholder';
      ph.textContent = '🍲';
      card.appendChild(ph);
    }

    var body = document.createElement('div');
    body.className = 'result-body';

    var name = document.createElement('div');
    name.className = 'result-name';
    name.textContent = best.shop.name;
    body.appendChild(name);

    // 場所情報
    var locDiv = document.createElement('div');
    locDiv.style.cssText = 'font-size:0.78rem;color:rgba(201,168,76,0.8);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;';
    var locText = '📍 ' + best.shop.location;
    locDiv.innerHTML = locText;
    if (best.shop.locationNote) {
      var noteSpan = document.createElement('span');
      noteSpan.style.cssText = 'background:#C8102E;color:#fff;font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:10px;';
      noteSpan.textContent = '⚠️ ' + best.shop.locationNote;
      locDiv.appendChild(noteSpan);
    }
    body.appendChild(locDiv);

    var desc = document.createElement('div');
    desc.className = 'result-desc';
    desc.textContent = best.shop.desc;
    body.appendChild(desc);

    card.appendChild(body);
    div.appendChild(card);

    if (ranked.length > 1) {
      var ru = document.createElement('div');
      ru.className = 'runner-up';
      var ruTitle = document.createElement('div');
      ruTitle.className = 'runner-up-title';
      ruTitle.textContent = '他のおすすめ';
      ru.appendChild(ruTitle);
      ranked.slice(1, 3).forEach(function(r, i) {
        var row = document.createElement('div');
        row.className = 'runner-up-row';
        var locNote = r.shop.locationNote ? ' <span style="background:#C8102E;color:#fff;font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:8px;">⚠️ ' + r.shop.locationNote + '</span>' : '';
        row.innerHTML = '<span class="runner-up-num">' + (i + 2) + '位</span><span class="runner-up-name">' + r.shop.name + '</span><span style="font-size:0.72rem;color:rgba(245,240,235,0.4);margin-left:4px;">📍 ' + r.shop.location + '</span>' + locNote;
        ru.appendChild(row);
      });
      div.appendChild(ru);
    }

    var restart = document.createElement('button');
    restart.className = 'restart-btn';
    restart.textContent = '🔄 もう一度診断する';
    restart.onclick = function() {
      chatWindow.innerHTML = '';
      answers = [];
      selectedPriorities = [];
      detailQueue = [];
      detailIndex = 0;
      startFlow();
    };
    div.appendChild(restart);

    appendMsg('bot', div);
  }, 800);
}

function startFlow() {
  appendMsg('bot', 'こんにちは！🍲<br>メルスタのもつ煮、どれにしようか迷っていませんか？<br>いくつか教えてもらえれば、ぴったりの一杯を紹介します！');
  showPrioritySelect();
}

startFlow();
</script>
</body>
</html>
